<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>DUKS: Dashboard for Unified Kernel Statistics</title>
	  <meta name="description" content="Analytical Dashboard of the Linux Kernel development cycles and its contributors">
	  <meta name="keywords" content="Linux, Kernel, Open Surce, Analytical, Dashboard">
	  <meta name="author" content="Rafael Passos <rafael@rcpassos.me>">
	  <meta name="author" content="Arthur Pilone Maia da Silva <arthurpilone@usp.br>">
	  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="static/script.js"></script>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <header>
        <h1>🦆 DUKS - Dashboard for Unified Kernel Statistics</h1>
    </header>
    <section class="flexRow">
        <div id="plotDiv" style="width:75vw;height:80vh;"></div>
        <div id="controls">
            <div v-for="(checked, metric) in metrics" :key="metric">
                <input type="checkbox" :id="'check' + metric" v-model="metrics[metric]" @change="handleMetricChange" />
                <label :for="'check' + metric">{{ formatMetricName(metric) }}</label>
            </div>
            <br>
            <div>
                <input id="checkCustom" type="checkbox" v-model="showCustomRatio" @change="handleCustomRatioChange" />
                <label for="checkCustom"> Plot Custom Ratio</label>
            </div>
            <div v-show="showCustomRatio" id="customRatioArea">
                <select v-model="overRatio" @change="handleRatioChange">  
                    <option v-for="metric in availableMetrics" :key="'over' + metric" :value="metric">
                        {{ formatMetricName(metric) }}
                    </option>
                </select>
                <p style="text-align: center;">by</p>
                <select v-model="underRatio" @change="handleRatioChange">
                    <option v-for="metric in availableMetrics" :key="'under' + metric" :value="metric">
                        {{ formatMetricName(metric) }}
                    </option>
                </select>
            </div>
            <br>
            <div>
                <label for="windowLen"> Sliding Window Length</label>
                <select v-model="windowLength" @change="handleWindowChange">  
                    <option v-for="(label, value) in windowOptions" :key="value" :value="value">
                        {{ label }}
                    </option>
                </select>
            </div>
        </div>
    </section>

    <script>
        const { createApp, ref, computed } = Vue

        createApp({
            setup() {
                // Available metrics for selection
                const availableMetrics = [
                    'Authors', 'Committers', 'Reviewed_Bys', 'Maintainers_Listed',
                    'Authoring_Maintainers', 'Supporting_Maintainers', 'Commits',
                    'LoC_Added', 'LoC_Removed', 'LoC_Changes', 'LoC_Net'
                ]

                // Window length options
                const windowOptions = {
                    1: '1 Day',
                    5: '5 Days',
                    14: '2 Weeks',
                    30: '1 Month',
                    365: '1 Year'
                }

                // State management
                const metrics = ref({
                    Authors: true,
                    Committers: true,
                    Reviewed_Bys: false,
                    Maintainers_Listed: false,
                    Authoring_Maintainers: false,
                    Supporting_Maintainers: false,
                    Commits: false,
                    LoC_Added: false,
                    LoC_Removed: false,
                    LoC_Changes: false,
                    LoC_Net: true,
                    Tags: false
                })

                const showCustomRatio = ref(false)
                const overRatio = ref('LoC_Changes')
                const underRatio = ref('Committers')
                const windowLength = ref(14)

                // Methods
                const formatMetricName = (metric) => {
                    return metric.replace(/_/g, ' ')
                }

                const handleMetricChange = () => {
                    // Update branchData and replot
                    const branchData = getBranchData()
                    branchData.leftDataPoints = []
                    branchData.rightDataPoints = []

                    for (const [metric, checked] of Object.entries(metrics.value)) {
                        if (metric === 'Tags') {
                            branchData.showTags = checked
                            continue
                        }

                        if (checked) {
                            if (['Authors', 'Committers', 'Reviewed_Bys', 'Maintainers_Listed', 
                                 'Authoring_Maintainers', 'Supporting_Maintainers', 'Commits'].includes(metric)) {
                                branchData.leftDataPoints.push(metric)
                            } else {
                                branchData.rightDataPoints.push(metric)
                            }
                        }
                    }

                    plot_figure()
                }

                const handleCustomRatioChange = () => {
                    const branchData = getBranchData()
                    branchData.showRatio = showCustomRatio.value
                    branchData.overRatio = overRatio.value
                    branchData.underRatio = underRatio.value
                    plot_figure()
                }

                const handleRatioChange = () => {
                    if (showCustomRatio.value) {
                        const branchData = getBranchData()
                        branchData.overRatio = overRatio.value
                        branchData.underRatio = underRatio.value
                        plot_figure()
                    }
                }

                const handleWindowChange = () => {
                    computeBranchData(windowLength.value).then(() => {
                        plot_figure()
                    })
                }

                return {
                    metrics,
                    showCustomRatio,
                    overRatio,
                    underRatio,
                    windowLength,
                    availableMetrics,
                    windowOptions,
                    formatMetricName,
                    handleMetricChange,
                    handleCustomRatioChange,
                    handleRatioChange,
                    handleWindowChange
                }
            }
        }).mount('#controls')
    </script>
</body>
</html>
